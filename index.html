<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveMitra</title>

<style>
body{
font-family: Arial;
background:#0b5ed7;
margin:0;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#0b5ed7;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:8px;
font-size:16px;
margin-top:15px;
}
</style>

</head>

<body>

<div class="card">
<h2>DriveMitra</h2>

<input placeholder="Mobile Number">

<select>
<option>Destination State</option>
<option>Haryana</option>
<option>Punjab</option>
<option>Delhi</option>
<option>Rajasthan</option>
</select>

<select>
<option>Vehicle Category</option>
<option>Motor Cab (4-6)</option>
<option>Maxi Cab (6-20)</option>
<option>Bus</option>
<option>Goods Vehicle</option>
</select>

<button>Submit Request</button>

</div>

</body>
</html>
