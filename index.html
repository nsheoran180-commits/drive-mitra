<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Mitra - Book Your Ride</title>
    <link rel="stylesheet" href="user.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="logo">🚗 Drive Mitra</div>
        <h1>Book Your Ride</h1>
        
        <div class="booking-card">
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter full name">
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter mobile number">
            </div>
            <div class="input-group">
                <label>Pickup Location</label>
                <input type="text" id="pickup" placeholder="From where?">
            </div>
            <div class="input-group">
                <label>Drop Location</label>
                <input type="text" id="drop" placeholder="Where to?">
            </div>
            
            <button id="book-btn" onclick="bookRide()">Book Now</button>
            <p id="msg"></p>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="user.js"></script>
</body>
</html>
